<!doctype html>
<html lang="zh"><head><meta charset="utf-8"></head><body>
<!-- open shadow ⊂ 同源 iframe:子帧内再开 open shadow,按钮在 shadow 里。 -->
<div id="host"></div>
<script>
  var sr = document.getElementById("host").attachShadow({ mode: "open" });
  sr.innerHTML = '<button id="b" style="padding:8px">shadow-in-spif 按钮</button>';
  sr.querySelector("#b").addEventListener("click", function () {
    top.document.querySelector("[data-testid=result]").textContent = "shadow-in-spif-clicked";
  });
</script>
</body></html>
