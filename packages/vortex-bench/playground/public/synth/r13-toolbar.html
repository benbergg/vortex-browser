<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>r13 toolbar regression</title>
<style>.btn{padding:4px 10px;display:inline-block;margin-right:4px;border:1px solid #888}</style>
</head><body>
<h1>R13 toolbar regression</h1>

  <span class="btn" role="presentation">Bold</span>
  <span class="btn" role="presentation">Italic</span>
  <span class="btn" role="presentation">Underline</span>
</div>
</body></html>
