<!doctype html>
<html lang="en" class="h-100"><head style="display:none">
  <title style="display:none">Web form</title>

  <meta charset="utf-8" style="display:none">
  <meta name="viewport" content="width=device-width, initial-scale=1" style="display:none">

  <link href="//cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet" style="display:none">
  
  
  
  <link href="//unpkg.com/bootstrap-datepicker@1.9.0/dist/css/bootstrap-datepicker3.min.css" rel="stylesheet" style="display:none">
</head>

<body class="d-flex flex-column h-100">
  <main class="flex-shrink-2">
    <div class="container">
      <div class="row">
        <div class="col-12">
          <h1 class="display-6">Web form</h1>
        </div>
      </div>
      <form method="get" action="submitted-form.html">
        <div class="row">
          <div class="col-md-4 py-2">
            <label class="form-label w-100">Text input
              <input type="text" class="form-control" name="my-text" id="my-text-id" myprop="myvalue" data-vtx-oracle="c0" style="cursor:text">
            </label>

            <label class="form-label w-100">Password
              <input type="password" class="form-control" name="my-password" autocomplete="off" data-vtx-oracle="c1" style="cursor:text">
            </label>

            <label class="form-label w-100">Textarea
              <textarea class="form-control" name="my-textarea" rows="3" data-vtx-oracle="c2" style="cursor:text"></textarea>
            </label>

            <label class="form-label w-100">Disabled input
              <input class="form-control" type="text" name="my-disabled" placeholder="Disabled input" disabled="" data-vtx-oracle="c3">
            </label>

            <label class="form-label w-100">Readonly input
              <input class="form-control" type="text" name="my-readonly" value="Readonly input" readonly="" data-vtx-oracle="c4" style="cursor:text">
            </label>

            <div class="form-group tp-align-right mt-3">
              <a href="./index.html" data-vtx-oracle="c5" style="cursor:pointer">
                Return to index
              </a>
            </div>
          </div>

          <div class="col-md-4 py-2">
            <label class="form-label w-100">Dropdown (select)
              <select class="form-select" name="my-select" data-vtx-oracle="c6">
                <option selected="">Open this select menu</option>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
              </select>
            </label>

            <label class="form-label w-100">Dropdown (datalist)
              <input class="form-control" list="my-options" name="my-datalist" placeholder="Type to search..." data-vtx-oracle="c7" style="cursor:text">
              <datalist id="my-options" style="display:none">
                <option value="San Francisco">
                </option><option value="New York">
                </option><option value="Seattle">
                </option><option value="Los Angeles">
                </option><option value="Chicago">
              </option></datalist>
            </label>

            <label class="form-label w-100">File input
              <input class="form-control" type="file" name="my-file" data-vtx-oracle="c8" style="cursor:pointer">
            </label>

            <div class="form-check">
              <label class="form-check-label w-100">
                <input class="form-check-input" type="checkbox" name="my-check" id="my-check-1" checked="" data-vtx-oracle="c9">
                Checked checkbox
              </label>

              <label class="form-check-label w-100">
                <input class="form-check-input" type="checkbox" name="my-check" id="my-check-2" data-vtx-oracle="c10">
                Default checkbox
              </label>
            </div>

            <div class="form-check">
              <label class="form-check-label w-100">
                <input class="form-check-input" type="radio" name="my-radio" id="my-radio-1" checked="" data-vtx-oracle="c11">
                Checked radio
              </label>
            </div>
            <div class="form-check">
              <label class="form-check-label w-100">
                <input class="form-check-input" type="radio" name="my-radio" id="my-radio-2" data-vtx-oracle="c12">
                Default radio
              </label>
            </div>

            <button type="submit" class="btn btn-outline-primary mt-3" data-vtx-oracle="c13" style="cursor:pointer">Submit</button>

          </div>

          <div class="col-md-4 py-2">
            <label class="form-label w-100">Color picker
              <input type="color" class="form-control form-control-color" name="my-colors" value="#563d7c" data-vtx-oracle="c14" style="cursor:pointer">
            </label>

            <label class="form-label w-100">Date picker
              <input type="text" class="form-control" name="my-date" data-vtx-oracle="c15" style="cursor:text">
            </label>

            <label class="form-label w-100">Example range
              <input type="range" class="form-range" name="my-range" min="0" max="10" step="1" value="5" data-vtx-oracle="c16">
            </label>

            <input type="hidden" name="my-hidden" data-vtx-oracle="c17" style="display:none">
          </div>
        </div>
      </form>
    </div>
  </main>
  



</body></html>
