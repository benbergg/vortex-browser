<!doctype html>
<html lang="zh"><head><meta charset="utf-8"><title>native controls</title></head>
<body>
<h1>原生表单控件(checkbox/radio,区别于 Element Plus)</h1>
<!-- 镜像 Stagehand checkboxes/radio_btn:原生控件勾选,读 checked 验证。 -->
<label><input type="checkbox" id="cb" aria-label="勾选项">同意条款</label>
<br>
<label><input type="radio" name="r" id="rA" value="A" aria-label="选项A">A</label>
<label><input type="radio" name="r" id="rB" value="B" aria-label="选项B">B</label>
</body></html>
