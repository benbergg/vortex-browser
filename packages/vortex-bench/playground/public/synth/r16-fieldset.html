<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>r16 fieldset regression</title>
<style>fieldset.fs{border:1px solid #888;padding:12px 16px;width:380px;margin-top:8px}legend{font-weight:bold;padding:0 6px}</style>
</head><body>
<h1>R16 fieldset regression</h1>
<!-- fieldset HTML-AAM 隐式映射 → role=group:form controls 分组标准模式。
     fieldset + legend 给 form section 容器加 accessibleName。 -->
<fieldset class="fs" data-vtx-oracle="r16-fieldset">
  <legend>Shipping address</legend>
  Fill in your shipping address details.
</fieldset>
</body></html>
