<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>r9 menu regression</title>
<style>.mi{padding:4px 12px;display:block}</style>
</head><body>
<h1>R9 menu regression</h1>
<!-- menu(composite)容器自身召回:子元素用 role=presentation 防双 emit。 -->
<ul role="menu" aria-label="Edit menu" data-vtx-oracle="r9-menu">
  <li class="mi" role="presentation">Cut</li>
  <li class="mi" role="presentation">Copy</li>
  <li class="mi" role="presentation">Paste</li>
</ul>
</body></html>
