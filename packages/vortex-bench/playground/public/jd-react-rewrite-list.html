<!DOCTYPE html>
<!--
  Author: qingwa
  Description: R1 Runbook Fixture (N0060 京东选品评测 V1)
    模拟京东搜索结果页 React 重写后的 DOM 结构, 一 fixture 覆盖 3 修复点:

    1. BUG-010: 京东商品卡无 <a> 详情链接, 整张卡是 <div> + React onClick 桩 +
       cursor:pointer。vortex 修复: observe 标 data-vortex-react-clickable,
       click 自动走 CDP 真实 mouse (isTrusted=true)。

    2. REQ-009: 京东 30 个客服图标 (≤32px 无文本 <a class="_newIcon_*">)
       + 1 个京东 logo (190x58)。vortex 修复: 兜底名 'icon-link @x=N,y=N'。

    3. REQ-NNN: 京东自营 / 明日达 / 百亿补贴等角标是 <img alt="...">。
       vortex 修复: extract 默认追加 img[alt] 中未在 innerText 出现的 alt 文字。

    用途: vortex-bench case 回归锁, 避免后续修改破坏这 3 修复点。
    - BUG-010 case: 验证 reactClickable 标 + click success
    - REQ-009 case: 验证 icon-link 兜底名
    - REQ-NNN case: 验证 extract 输出含 "自营" "明日达" 等 alt
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>京东搜索结果页 React 重写 fixture (R1 BUG-010 + REQ-009 + REQ-NNN)</title>
  <style>
    body { font-family: -apple-system, "PingFang SC", sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
    /* 京东 logo: 1 个空名 <a> 190x58 (装饰性 link, 不计入商品卡空名率) */
    .jd-logo {
      display: inline-block; width: 190px; height: 58px;
      background: #e1251b; vertical-align: middle;
    }
    .header { padding: 12px 20px; background: #fff; border-bottom: 1px solid #eee; }
    .search-bar { margin-top: 12px; }
    .search-input { width: 480px; height: 32px; padding: 0 12px; border: 1px solid #ddd; }

    /* 商品卡容器 (京东 SPA hash class) */
    ._container_65r2s_2 { display: flex; flex-wrap: wrap; gap: 12px; padding: 12px; }
    ._wrapper_1fqso_3 { width: 240px; }
    /* 商品卡本体: div + React onClick 桩 + cursor:pointer (无 <a> 详情链接) */
    ._card_1fqso_83 {
      background: #fff; padding: 12px; border: 1px solid #eee; border-radius: 4px;
      cursor: pointer; user-select: none;
    }
    ._card_1fqso_83:hover { border-color: #e1251b; }
    ._card_1fqso_83 .title { font-size: 13px; line-height: 1.4; min-height: 36px; }
    ._card_1fqso_83 .price { color: #e1251b; font-size: 16px; font-weight: 600; margin-top: 8px; }
    /* 角标: 京东自营 / 明日达 / 百亿补贴 — 用 <img alt="..."> 渲染, 关键测点 */
    ._card_1fqso_83 .badges { display: flex; gap: 4px; margin: 6px 0; flex-wrap: wrap; }
    ._card_1fqso_83 .badges img {
      height: 16px; width: auto; display: inline-block;
      /* 京东角标图片 CSS hash class, vortex 也会把它当 _imgTag_ 翻译 */
    }
    /* 客服图标: 16x16, href=chat.jd.com, 关键测点 (REQ-009 5 条件全命中) */
    ._newIcon_zclqt_32._customer_service_icon_zclqt_60 {
      display: inline-block; width: 16px; height: 16px;
      background: #999; border-radius: 50%;
    }
  </style>
</head>
<body>
  <!-- 京东 logo: 1 个空名 <a> 190x58 (装饰性 link, 排除自商品卡空名率) -->
  <div class="header">
    <a class="jd-logo" href="https://www.jd.com/" id="jd-logo"></a>

  <div id="click-result" data-testid="click-result" style="margin-top: 20px; padding: 12px; background: #fff; border: 1px solid #ddd; min-height: 30px;">
    (未点击)
  </div>

  <script>
    // 模拟 React onClick 桩: 拦截 click 事件, 显示被点击的 SKU
    // (京东 React 18 root delegation 拦截 isTrusted=false click, 但本 fixture 用 vanilla
    //  事件 listener 接受合成 click 以验证 BUG-010 修复在 fixture 上可观测)
    document.querySelectorAll("._card_1fqso_83").forEach((card) => {
      const sku = card.getAttribute("data-sku");
      const title = card.querySelector(".title")?.textContent;
      card.addEventListener("click", () => {
        document.getElementById("click-result").textContent =
          `已点击商品: ${title} (sku=${sku})`;
      });
    });
  </script>

</html>
