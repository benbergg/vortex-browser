name: vortex-bench

# v0.6 起 bench 改为 mechanical playground（Vite + Element Plus + MCP 断言脚本）。
# 仍然依赖 "真实 Chrome + vortex extension 已激活 + vortex-server ws 6800"，
# GitHub Actions 默认 runner 无法直接跑。本 workflow 是占位，提醒本地运行。

on:
  workflow_dispatch:

jobs:
  bench-placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remind about local run
        run: |
          cat <<'EOT'
          ⚠️  vortex-bench v0.6 需要真实 Chrome + extension + vortex-server。
          本地运行：
            pnpm -F @vortex-browser/bench playground    # 独立终端
            pnpm -F @vortex-browser/bench bench run --all
          见 packages/vortex-bench/README.md。
          EOT
          exit 78  # neutral
